name: Android Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.1.0'

      - name: Create local environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env
          fi

      - name: Create CI debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Prepare APK
        run: |
          mkdir -p release-apk
          cp app/build/outputs/apk/debug/app-debug.apk "release-apk/Rock-Screen-${{ github.run_number }}.apk"
          ls -lah release-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rock-Screen-APK
          path: release-apk/*.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: Rock-Screen-APK
          path: release-apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v1.0.{0}', github.run_number) }}
          name: Rock Screen ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v1.0.{0}', github.run_number) }}
          body: |
            Automated APK release for Rock Screen / HiShoot Studio.

            This workflow builds a debug-signed APK so releases work without private keystore secrets.
            Use a tagged release with real signing secrets later for Play Store production builds.
          files: release-apk/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
